<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMERSALUD DEL CAUCA | Ambulancias Popayán</title>
    <style>
        :root {
            --azul-corp: #005CA9; /* */
            --rojo-corp: #D20A11; /* */
            --gris-texto: #575757; /* */
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            color: var(--gris-texto);
        }

        /* Cabecera */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: var(--blanco);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-container img {
            height: 60px; /* Aquí se visualizará el logo ES */
        }

        /* Banner Principal con Ambulancia */
        .hero {
            background: linear-gradient(rgba(0, 92, 169, 0.7), rgba(0, 92, 169, 0.7)), 
                        url('https://images.unsplash.com/photo-1587745416684-47953f16f002?q=80&w=1000'); /* Representación de ambulancia */
            background-size: cover;
            background-position: center;
            height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--blanco);
            text-align: center;
            padding: 20px;
        }

        .hero h1 { font-size: 2.5rem; margin-bottom: 10px; }

        /* Botón WhatsApp */
        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            padding: 18px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            display: inline-flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .btn-whatsapp:hover {
            transform: scale(1.05);
            background-color: #128c7e;
        }
