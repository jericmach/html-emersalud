<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMERSALUD DEL CAUCA S.A.S</title>
    <style>
        :root {
            --azul: #005CA9;
            --rojo: #D20A11;
            --blanco: #ffffff;
        }
        body { font-family: 'Arial', sans-serif; margin: 0; text-align: center; background-color: var(--azul); color: var(--blanco); }
        
        .container { padding: 50px 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; text-transform: uppercase; }
        p { font-size: 1.2rem; margin-bottom: 30px; }

        /* Contenedor de la Ambulancia */
        .ambulancia-box {
            background-color: var(--blanco);
            border-radius: 20px;
            padding: 20px;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            max-width: 90%;
        }

        .ambulancia-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
        }

        /* Botón WhatsApp */
        .btn-whatsapp {
            display: inline-block;
            margin-top: 30px;
            background-color: #25D366;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .btn-whatsapp:hover { transform: scale(1.05); background-color: #128c7e; }
    </style>
</head>
<body>

    <div class="container">
        <h1>EMERSALUD DEL CAUCA S.A.S</h1>
        <p>Servicios Prehospitalarios 24/7 en Popayán</p>

        <div class="ambulancia-box">
            <img src="https://img.freepik.com/vector-premium/ambulancia-aislada-blanco-estilo-plano-ilustracion-vectorial_108420-137.jpg" 
                 alt="Ambulancia Emersalud" 
                 class="ambulancia-img">
        </div>

        <br>
        <a href="https://wa.me/573234448048" class="btn-whatsapp">
            🟢 PEDIR AMBULANCIA (WhatsApp)
        </a>
    </div>

</body>
</html>
